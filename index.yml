# Dynamics 365 Finance & Operations developer catalog.
# install.kind d365_vs_addin_extensions: catalog manager downloads files into Dynamics VS AddinExtensions (see TRUDUtils / InstallToVS pattern).
# SSD365 README also documents AddInPaths + DynamicsDevConfig.xml - alternate if AddinExtensions drop does not load the add-in.
#
# Raw URL:
#   https://raw.githubusercontent.com/shadowchamber/d365f-addins/main/index.yml

catalog_version: 1
updated: "2026-05-10"

addins:
  - id: trudutils
    name: TRUDUtilsD365
    description: >
      Visual Studio add-in for Dynamics 365 Finance & Operations development (DLL-based; installs into
      the Dynamics VS tools AddinExtensions folder, same as the InstallToVS helper). Release 3.2.1
      highlights: Show cross-reference Add-in. Upstream project and releases are maintained by TrudAX;
      InstallToVS reference implementation: github.com/shadowchamber/TRUDUtilsD365/tree/master/InstallToVS.
    version: "3.2.1"
    last_update: "2026-03-23"
    publisher: TrudAX
    repository: "https://github.com/TrudAX/TRUDUtilsD365"
    documentation_url: "https://github.com/TrudAX/TRUDUtilsD365/blob/master/README.md"
    distribution_url: "https://github.com/TrudAX/TRUDUtilsD365/releases/tag/3.2.1"
    tags:
      - d365fo
      - vs-addin
      - trudutils
      - productivity
    install:
      kind: d365_vs_addin_extensions
      files:
        - name: TRUDUtilsD365.dll
          url: "https://github.com/TrudAX/TRUDUtilsD365/releases/download/3.2.1/TRUDUtilsD365.dll"
        - name: TRUDUtilsD365.pdb
          url: "https://github.com/TrudAX/TRUDUtilsD365/releases/download/3.2.1/TRUDUtilsD365.pdb"

